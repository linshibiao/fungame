<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Game - Cyber Basketball Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #040814;
            --card-bg: rgba(10, 20, 42, 0.75);
            --arena-bg: rgba(5, 11, 26, 0.95);
            
            --neon-orange: #ff5100;
            --neon-glow: #ff7700;
            --cyber-cyan: #00f3ff;
            
            --text-main: #ffffff;
            --text-muted: #768fa9;
            --ui-border: rgba(0, 243, 255, 0.2);
            --ui-orange-border: rgba(255, 81, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            letter-spacing: 0.5px;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(to bottom, rgba(4, 8, 20, 0.5), #040814),
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            z-index: -2;
        }

        body::after {
            content: "";
            position: absolute;
            top: 30%;
            left: 50%;
            width: 200%;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 81, 0, 0.08) 0%, transparent 60%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            background-color: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 2px solid var(--ui-border);
            border-top: 2px solid var(--cyber-cyan);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.7),
                0 0 30px rgba(0, 243, 255, 0.15),
                inset 0 0 20px rgba(0, 243, 255, 0.05);
            text-align: center;
            max-width: 650px;
            width: 90%;
            margin: 2rem auto;
            position: relative;
        }

        .container::before, .container::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--neon-orange);
            border-style: solid;
            pointer-events: none;
        }
        .container::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .container::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        .icon-badge {
            width: 60px;
            height: 60px;
            background: rgba(4, 8, 20, 0.8);
            border: 2px solid var(--neon-orange);
            border-radius: 6px;
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 81, 0, 0.3);
            transform: rotate(45deg);
        }

        .icon-badge svg {
            width: 32px;
            height: 32px;
            fill: var(--text-main);
            transform: rotate(-45deg);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(180deg, #ffffff 40%, #a2cadc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.intro {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* --- Game Arena Dashboard Layout --- */
        .game-arena {
            background-color: var(--arena-bg);
            border: 1px solid var(--ui-orange-border);
            border-left: 4px solid var(--neon-orange);
            border-radius: 6px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .arena-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--cyber-cyan);
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Live Score & Timer Sub-HUD */
        .hud-display {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.4);
            padding: 0.5rem;
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 1rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
        }
        .hud-val {
            color: var(--neon-orange);
            font-weight: 900;
        }

        /* Interactive Canvas Arena */
        #courtCanvas {
            background: radial-gradient(circle at 50% 10%, #101f38 0%, #050b1a 80%);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 4px;
            display: block;
            margin: 0 auto 1.5rem;
            max-width: 100%;
            cursor: crosshair;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .arena-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .arena-btn {
            background: linear-gradient(135deg, rgba(20, 35, 65, 0.7) 0%, rgba(10, 18, 36, 0.9) 100%);
            color: #ffffff;
            border: 1px solid var(--ui-border);
            padding: 0.7rem 1.4rem;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0% 100%, 0% 8px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .arena-btn:hover {
            transform: translateY(-2px) scale(1.05);
            border-color: var(--cyber-cyan);
            color: var(--cyber-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .arena-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            border-color: var(--ui-border) !important;
            color: #fff !important;
        }

        /* System Action Overrides */
        .btn {
            display: inline-block;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, var(--neon-orange) 0%, #ff7700 100%);
            color: #040814;
            font-weight: 900;
            font-size: 1rem;
            text-decoration: none;
            text-transform: uppercase;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 4px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 81, 0, 0.4);
            clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover {
            background: linear-gradient(90deg, #ff7700 0%, #ffaa00 100%);
            box-shadow: 0 0 35px var(--neon-glow);
            transform: scale(1.04);
        }

        footer {
            padding: 2rem;
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
            border-top: 1px solid rgba(0, 243, 255, 0.1);
            background: rgba(4, 8, 20, 0.9);
            backdrop-filter: blur(8px);
        }

        footer span {
            color: var(--cyber-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-badge">
            <svg viewBox="0 0 24 24">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 16.5,5.5C14.57,7.5 12,10.12 12,14C12,16.58 13,18.89 14.59,20.58C13.78,20.85 12.91,21 12,21A9,9 0 0,1 3,12C3,9.58 4,7.4 5.59,5.82C7.12,8.12 9.5,10 12,10C14,10 16.5,8.5 18.42,6.58C19.41,7.96 20,9.66 20,11.5C18,11.5 15.12,12 13.5,14.5C11.69,17.29 12,20.17 12,20.17C7.58,19.67 4.15,16.14 3.71,11.66C6,11.5 9,12 11,14.5C12.19,16 11.81,18.17 11.31,19.61C6.88,18.86 3.5,15 3.5,10.5C5.5,10.5 8.12,9.5 9.88,7.38C10.74,6.33 11,5.15 11,4.11C11.33,4.04 11.66,4 12,4Z" />
            </svg>
        </div>
        
        <h1>Welcome to fun game</h1>
        <p class="intro">Your master coding hub playground. Click <strong>Tip Off</strong> to test your trickshot trajectory algorithms!</p>
        
        <div class="game-arena">
            <div class="arena-title" id="gameStatus">// SYSTEM: READY TO HOOP</div>
            
            <div class="hud-display">
                <div>SCORE: <span id="scoreVal" class="hud-val">0</span></div>
                <div>TIME: <span id="timeVal" class="hud-val">30</span>s</div>
                <div>HI-SCORE: <span id="hiScoreVal" class="hud-val">0</span></div>
            </div>

            <canvas id="courtCanvas" width="480" height="280"></canvas>

            <div class="arena-controls">
                <button class="arena-btn" id="btnWarmUp">Warm Up</button>
                <button class="arena-btn" id="btnTipOff">Tip Off</button>
                <button class="arena-btn" id="btnReset">Reset</button>
            </div>
        </div>
        
        <button class="btn" onclick="alert('System Core Active. Dominate the court!')">Sync Profile</button>
    </div>

    <footer>
        <p>System Mainframe Created by <span>flashhoops kids</span> // Core.2026</p>
    </footer>

    <script>
        const canvas = document.getElementById('courtCanvas');
        const ctx = canvas.getContext('2d');

        // Audio Synthesis Setup (No external assets required!)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // Game Configuration & Engine State
        let score = 0;
        let hiScore = 0;
        let timeLeft = 30;
        let isPlaying = false;
        let gameInterval = null;

        // Physics Components
        const gravity = 0.35;
        let ball = { x: 60, y: 220, vx: 0, vy: 0, radius: 10, isFlying: false, baseSkin: '#ff5100' };
        const hoop = { x: 400, y: 90, width: 35, rimHeight: 4 };
        let pointer = { x: 0, y: 0 };

        // Handle Tracking Input Trajectories
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            pointer.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            pointer.y = (e.clientY - rect.top) * (canvas.height / rect.height);
        });

        canvas.addEventListener('click', () => {
            if (ball.isFlying) return;
            
            // Unmute Audio context on human interaction
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Calculate Vector Forces based on Crosshair positions
            const dx = pointer.x - ball.x;
            const dy = pointer.y - ball.y;
            
            // Limit and safe-scale vectors
            ball.vx = Math.min(Math.max(dx * 0.065, 3), 14);
            ball.vy = Math.min(Math.max(dy * 0.065, -14), -3);
            ball.isFlying = true;
            
            playTone(280, 'triangle', 0.15);
        });

        // Interactive HUD Controllers
        document.getElementById('btnWarmUp').addEventListener('click', () => {
            resetBall();
            document.getElementById('gameStatus').innerText = "// TRAINING MODULE ACTIVE";
        });

        document.getElementById('btnTipOff').addEventListener('click', () => {
            if (isPlaying) return;
            score = 0;
            timeLeft = 30;
            isPlaying = true;
            resetBall();
            
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('timeVal').innerText = timeLeft;
            document.getElementById('gameStatus').innerText = "// ARENA MATCH LIVE!";
            document.getElementById('btnTipOff').disabled = true;

            playTone(587.33, 'sine', 0.4); // Game whistle tone

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timeVal').innerText = timeLeft;
                if (timeLeft <= 0) {
                    endMatch();
                }
            }, 1000);
        });

        document.getElementById('btnReset').addEventListener('click', () => {
            endMatch();
            score = 0;
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('gameStatus').innerText = "// SYSTEM: SYSTEM RESET";
        });

        function resetBall() {
            ball.x = 40 + Math.random() * 80; // randomize shot positions slightly
            ball.y = 230;
            ball.vx = 0;
            ball.vy = 0;
            ball.isFlying = false;
        }

        function endMatch() {
            isPlaying = false;
            clearInterval(gameInterval);
            document.getElementById('btnTipOff').disabled = false;
            document.getElementById('gameStatus').innerText = "// MATCH OVER. FINAL SCORE: " + score;
            if (score > hiScore) {
                hiScore = score;
                document.getElementById('hiScoreVal').innerText = hiScore;
            }
            playTone(220, 'sawtooth', 0.6);
            resetBall();
        }

        // Central Physics / Render Tick Loop
        function engineUpdate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Basketball Architecture Environment (Backboard & Hoop)
            ctx.strokeStyle = '#00f3ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(hoop.x + hoop.width + 10, hoop.y - 40);
            ctx.lineTo(hoop.x + hoop.width + 10, hoop.y + 20);
            ctx.stroke(); // Backboard line

            ctx.strokeStyle = '#ff5100';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(hoop.x, hoop.y);
            ctx.lineTo(hoop.x + hoop.width, hoop.y);
            ctx.stroke(); // Rim rim

            // Net Mesh Rendering
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i <= hoop.width; i+=7) {
                ctx.moveTo(hoop.x + i, hoop.y);
                ctx.lineTo(hoop.x + i + 4, hoop.y + 25);
                ctx.moveTo(hoop.x + i, hoop.y);
                ctx.lineTo(hoop.x + i - 4, hoop.y + 25);
            }
            ctx.stroke();

            // Ground Floor lines
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 255);
            ctx.lineTo(canvas.width, 255);
            ctx.stroke();

            // 2. Trajectory Targeting Vector (Guideline)
            if (!ball.isFlying) {
                ctx.strokeStyle = 'rgba(0, 243, 255, 0.25)';
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(ball.x, ball.y);
                ctx.lineTo(pointer.x, pointer.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 3. Mathematical Ball Physics Processing
            if (ball.isFlying) {
                ball.vy += gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Collision detection via simple intersection checking boundaries
                // Check scoring criteria (Passing rim accurately descending)
                if (ball.vy > 0 && 
                    ball.x >= hoop.x && ball.x <= hoop.x + hoop.width &&
                    ball.y >= hoop.y - 6 && ball.y <= hoop.y + 10) {
                    
                    if (isPlaying) {
                        score += 3;
                        document.getElementById('scoreVal').innerText = score;
                    }
                    document.getElementById('gameStatus').innerText = "// SPLASH! +3 POINTS";
                    playTone(880, 'sine', 0.2);
                    
                    // Force state shift out of scoring zone
                    ball.y += 20; 
                }

                // Court floor boundaries
                if (ball.y + ball.radius >= 255) {
                    ball.y = 255 - ball.radius;
                    ball.vy = -ball.vy * 0.45; // dampening effect bouncing
                    ball.vx *= 0.8;
                    if(Math.abs(ball.vy) < 1) resetBall();
                }

                // Out of screen limits reset trigger
                if (ball.x > canvas.width + 50 || ball.x < -50) {
                    resetBall();
                }
            }

            // 4. Draw Ball Unit
            ctx.fillStyle = ball.baseSkin;
            ctx.shadowColor = varValue('--neon-glow');
            ctx.shadowBlur = ball.isFlying ? 15 : 0;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // reset blur

            requestAnimationFrame(engineUpdate);
        }

        // Helper calculation logic helper
        function varValue(varName) {
            return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
        }

        // Boot-Up Game Engine
        engineUpdate();
    </script>
</body>
</html>
